version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: shortenurl-postgres
    environment:
      POSTGRES_DB: ShortenURL
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shortenurl-redis
    ports:
      - "6379:6379"

  app:
    build: ./backend
    container_name: shortenurl-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ShortenURL
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data: